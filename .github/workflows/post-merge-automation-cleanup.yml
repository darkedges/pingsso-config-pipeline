name: Post-Merge Automation Cleanup

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
  JIRA_DONE_TRANSITION_NAME: ${{ vars.JIRA_DONE_TRANSITION_NAME }}

jobs:
  cleanup-and-jira-callback:
    name: Cleanup Branch and Update Jira
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Delete Automation Branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const headRef = pr?.head?.ref || '';
            const headRepo = pr?.head?.repo?.full_name || '';
            const currentRepo = `${context.repo.owner}/${context.repo.repo}`;

            if (!headRef.startsWith('automation/jsm-')) {
              core.info(`Skipping branch deletion. Non-automation branch: ${headRef}`);
              return;
            }

            if (headRepo !== currentRepo) {
              core.info(`Skipping branch deletion. PR branch is from different repo: ${headRepo}`);
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${headRef}`,
              });
              core.info(`Deleted merged automation branch: ${headRef}`);
            } catch (error) {
              if (error.status === 422 || error.status === 404) {
                core.info(`Branch already deleted or not found: ${headRef}`);
                return;
              }
              throw error;
            }

      - name: Parse Jira Metadata from PR Body
        id: jira_meta
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr?.body || '';

            const keyMatch = body.match(/Jira Issue Key:\s*([^\n]+)/i);
            const urlMatch = body.match(/Jira Ticket URL:\s*([^\n]+)/i);
            const issueMatch = body.match(/Closes\s+#(\d+)/i);

            const jiraUrl = urlMatch ? urlMatch[1].trim() : '';
            const jiraKeyFromBody = keyMatch ? keyMatch[1].trim() : '';
            const jiraKeyFromUrl = (jiraUrl.match(/([A-Z][A-Z0-9]+-\d+)/) || [])[1] || '';
            const jiraKey = jiraKeyFromBody || jiraKeyFromUrl;
            const issueNumber = issueMatch ? issueMatch[1].trim() : '';

            core.setOutput('jira_key', jiraKey);
            core.setOutput('jira_url', jiraUrl);
            core.setOutput('pr_url', pr?.html_url || '');
            core.setOutput('issue_number', issueNumber);

      - name: Post Jira merge comment
        id: jira_comment
        if: steps.jira_meta.outputs.jira_key != '' && env.JIRA_BASE_URL != ''
        env:
          JIRA_KEY: ${{ steps.jira_meta.outputs.jira_key }}
          JIRA_TICKET_URL: ${{ steps.jira_meta.outputs.jira_url }}
          PR_URL: ${{ steps.jira_meta.outputs.pr_url }}
          MERGED_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${JIRA_USER_EMAIL:-}" ] || [ -z "${JIRA_API_TOKEN:-}" ]; then
            echo "Jira credentials not configured. Skipping Jira comment."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "message=Jira credentials not configured; merge comment was skipped." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMENT_TEXT=$(cat <<EOF
          Pull request was merged and automation cleanup completed.

          Repository: ${{ github.repository }}
          Merge Commit: $MERGED_SHA
          Pull Request: $PR_URL
          Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Jira Ticket URL: $JIRA_TICKET_URL
          EOF
          )

          JIRA_API_ROOT="${JIRA_BASE_URL%/}"
          JIRA_KEY_CLEAN="$(printf "%s" "$JIRA_KEY" | tr -d '\r' | awk '{print $1}')"

          jq -n --arg body "$COMMENT_TEXT" '{body:$body}' > jira-comment.json

          HTTP_CODE=$(curl -sS -o jira-comment-response.json -w "%{http_code}" -X POST \
            --user "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data @jira-comment.json \
            "$JIRA_API_ROOT/rest/api/2/issue/$JIRA_KEY_CLEAN/comment" || true)

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            ERROR_TEXT=$(jq -r '([.errorMessages[]?] + ([.errors // {}] | to_entries | map("\(.key): \(.value)"))) | join("; ")' jira-comment-response.json 2>/dev/null || true)
            if [ -z "$ERROR_TEXT" ] || [ "$ERROR_TEXT" = "null" ]; then
              ERROR_TEXT=$(head -c 400 jira-comment-response.json | tr '\n' ' ')
            fi

            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "message=Jira comment failed (HTTP $HTTP_CODE): $ERROR_TEXT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "status=completed" >> "$GITHUB_OUTPUT"
          echo "message=Posted merge comment to Jira issue $JIRA_KEY." >> "$GITHUB_OUTPUT"

      - name: Transition Jira ticket to done state
        id: jira_transition
        if: steps.jira_meta.outputs.jira_key != '' && env.JIRA_BASE_URL != '' && env.JIRA_DONE_TRANSITION_NAME != ''
        env:
          JIRA_KEY: ${{ steps.jira_meta.outputs.jira_key }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${JIRA_USER_EMAIL:-}" ] || [ -z "${JIRA_API_TOKEN:-}" ]; then
            echo "Jira credentials not configured. Skipping Jira transition."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "message=Jira credentials not configured; transition was skipped." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JIRA_API_ROOT="${JIRA_BASE_URL%/}"
          JIRA_KEY_CLEAN="$(printf "%s" "$JIRA_KEY" | tr -d '\r' | awk '{print $1}')"

          HTTP_CODE=$(curl -sS -o jira-transitions-response.json -w "%{http_code}" \
            --user "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_API_ROOT/rest/api/3/issue/$JIRA_KEY_CLEAN/transitions" || true)

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            ERROR_TEXT=$(jq -r '([.errorMessages[]?] + ([.errors // {}] | to_entries | map("\(.key): \(.value)"))) | join("; ")' jira-transitions-response.json 2>/dev/null || true)
            if [ -z "$ERROR_TEXT" ] || [ "$ERROR_TEXT" = "null" ]; then
              ERROR_TEXT=$(head -c 400 jira-transitions-response.json | tr '\n' ' ')
            fi

            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "message=Jira transition lookup failed (HTTP $HTTP_CODE): $ERROR_TEXT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cp jira-transitions-response.json transitions.json

          AVAILABLE_TRANSITIONS=$(jq -r '[.transitions[].name] | join(", ")' transitions.json)
          TRANSITION_ID=$(jq -r --arg name "$JIRA_DONE_TRANSITION_NAME" '.transitions[] | select((.name | ascii_downcase) == ($name | ascii_downcase)) | .id' transitions.json | head -n 1)
          USED_TRANSITION_NAME="$JIRA_DONE_TRANSITION_NAME"

          if [ -z "$TRANSITION_ID" ]; then
            TRANSITION_ID=$(jq -r '.transitions[] | select(.to.statusCategory.key == "done") | .id' transitions.json | head -n 1)
            USED_TRANSITION_NAME=$(jq -r '.transitions[] | select(.to.statusCategory.key == "done") | .name' transitions.json | head -n 1)
          fi

          if [ -z "$TRANSITION_ID" ]; then
            echo "No matching Jira transition found. Configured: '$JIRA_DONE_TRANSITION_NAME'. Available transitions: $AVAILABLE_TRANSITIONS"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "message=No matching Jira transition found. Configured '$JIRA_DONE_TRANSITION_NAME'. Available: $AVAILABLE_TRANSITIONS" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          jq -n --arg id "$TRANSITION_ID" '{transition:{id:$id}}' > transition-request.json

          HTTP_CODE=$(curl -sS -o jira-transition-post-response.json -w "%{http_code}" -X POST \
            --user "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data @transition-request.json \
            "$JIRA_API_ROOT/rest/api/3/issue/$JIRA_KEY_CLEAN/transitions" || true)

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            ERROR_TEXT=$(jq -r '([.errorMessages[]?] + ([.errors // {}] | to_entries | map("\(.key): \(.value)"))) | join("; ")' jira-transition-post-response.json 2>/dev/null || true)
            if [ -z "$ERROR_TEXT" ] || [ "$ERROR_TEXT" = "null" ]; then
              ERROR_TEXT=$(head -c 400 jira-transition-post-response.json | tr '\n' ' ')
            fi

            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "message=Jira transition failed (HTTP $HTTP_CODE): $ERROR_TEXT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "status=completed" >> "$GITHUB_OUTPUT"
          echo "message=Transitioned Jira issue $JIRA_KEY using transition '$USED_TRANSITION_NAME'." >> "$GITHUB_OUTPUT"

      - name: Comment Issue with Jira callback status
        if: always()
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.jira_meta.outputs.issue_number }}
          JIRA_KEY: ${{ steps.jira_meta.outputs.jira_key }}
          JIRA_URL: ${{ steps.jira_meta.outputs.jira_url }}
          JIRA_COMMENT_STATUS: ${{ steps.jira_comment.outputs.status }}
          JIRA_COMMENT_MESSAGE: ${{ steps.jira_comment.outputs.message }}
          JIRA_TRANSITION_STATUS: ${{ steps.jira_transition.outputs.status }}
          JIRA_TRANSITION_MESSAGE: ${{ steps.jira_transition.outputs.message }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER || 0);
            if (!issueNumber) {
              core.info('No originating GitHub issue number found in PR body; skipping issue status comment.');
              return;
            }

            const jiraKey = process.env.JIRA_KEY || '';
            const jiraUrl = process.env.JIRA_URL || '';
            const commentStatus = process.env.JIRA_COMMENT_STATUS || 'not-run';
            const commentMessage = process.env.JIRA_COMMENT_MESSAGE || 'Jira merge comment step did not run.';
            const transitionStatus = process.env.JIRA_TRANSITION_STATUS || 'not-run';
            const transitionMessage = process.env.JIRA_TRANSITION_MESSAGE || 'Jira transition step did not run.';

            const body = [
              'Post-merge automation status:',
              '',
              jiraKey ? `- Jira issue: ${jiraKey}` : '- Jira issue: not detected from PR body',
              jiraUrl ? `- Jira URL: ${jiraUrl}` : '- Jira URL: not detected from PR body',
              `- Jira comment: ${commentStatus} - ${commentMessage}`,
              `- Jira transition: ${transitionStatus} - ${transitionMessage}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
