name: Create Issue from Jira Webhook
on:
  repository_dispatch:
    types: ["jira-uri-request"]

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Validate Jira Payload Schema
        uses: actions/github-script@v7
        env:
          TEAM: ${{ github.event.client_payload.fields.team_name }}
          APP: ${{ github.event.client_payload.fields.app_name }}
          APP_TYPE: ${{ github.event.client_payload.fields.app_type }}
          SAML_ENTITY_ID: ${{ github.event.client_payload.fields.saml_entity_id }}
          SAML_ACS_URL: ${{ github.event.client_payload.fields.saml_acs_url }}
          OIDC_GRANT_TYPES: ${{ github.event.client_payload.fields.oidc_grant_types }}
          DEV: ${{ github.event.client_payload.fields.dev_redirect_uris }}
          TEST: ${{ github.event.client_payload.fields.test_redirect_uris }}
          STAGE: ${{ github.event.client_payload.fields.stage_redirect_uris }}
          PROD: ${{ github.event.client_payload.fields.prod_redirect_uris }}
          JIRA_URL: ${{ github.event.client_payload.jsm_url }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
          REPORTER: ${{ github.event.client_payload.reporter }}
          SUMMARY: ${{ github.event.client_payload.summary }}
        with:
          script: |
            const payload = context.payload.client_payload || {};
            const fields = payload.fields || {};

            function normalizeListLike(value) {
              const cleanToken = (token) => String(token || '')
                .trim()
                .replace(/^\[+/, '')
                .replace(/\]+$/, '')
                .replace(/^"+|"+$/g, '')
                .replace(/^[-*]\s+/, '')
                .trim();

              if (value === undefined || value === null) {
                return [];
              }

              if (Array.isArray(value)) {
                return value.map(cleanToken).filter(Boolean);
              }

              const raw = String(value).trim();
              if (!raw) {
                return [];
              }

              if (raw.startsWith('[') && raw.endsWith(']')) {
                try {
                  const parsed = JSON.parse(raw);
                  if (Array.isArray(parsed)) {
                    return parsed.map(cleanToken).filter(Boolean);
                  }
                } catch {
                  // Fall through to delimiter split for non-JSON list strings.
                }
              }

              return raw
                .split(/\r?\n|,/) 
                .map(cleanToken)
                .filter(Boolean);
            }

            const required = [
              ['issue_key', payload.issue_key],
              ['jsm_url', payload.jsm_url],
              ['summary', payload.summary],
              ['reporter', payload.reporter],
              ['fields.team_name', fields.team_name],
              ['fields.app_name', fields.app_name],
              ['fields.app_type', fields.app_type],
            ];

            const missing = required
              .filter(([, value]) => value === undefined || value === null || String(value).trim() === '')
              .map(([name]) => name);

            const appType = normalizeListLike(fields.app_type).join(' ').toUpperCase();
            const isOidc = appType.includes('OIDC') || appType.includes('OAUTH');
            const isSaml = appType === 'SAML';

            if (!isOidc && !isSaml) {
              missing.push('fields.app_type(valid values: SAML or OIDC/OAuth2)');
            }

            if (isOidc) {
              const envUris = [
                fields.dev_redirect_uris,
                fields.test_redirect_uris,
                fields.stage_redirect_uris,
                fields.prod_redirect_uris,
              ].flatMap(v => normalizeListLike(v));

              if (envUris.length === 0) {
                missing.push('OIDC redirect URIs (at least one of dev/test/stage/prod)');
              }

              const grantTypesRaw = normalizeListLike(fields.oidc_grant_types);
              if (grantTypesRaw.length === 0) {
                missing.push('fields.oidc_grant_types');
              }
            }

            if (isSaml) {
              const samlEntity = normalizeListLike(fields.saml_entity_id)[0] || '';
              if (!samlEntity) {
                missing.push('fields.saml_entity_id');
              }
              const samlAcs = normalizeListLike(fields.saml_acs_url)[0] || '';
              if (!samlAcs) {
                missing.push('fields.saml_acs_url');
              } else if (!samlAcs.startsWith('https://')) {
                missing.push('fields.saml_acs_url(must start with https://)');
              }
            }

            if (missing.length > 0) {
              core.setFailed(`Jira webhook payload validation failed. Missing/invalid fields: ${missing.join(', ')}`);
            }

      - name: Create GitHub Issue
        id: create_issue
        uses: actions/github-script@v7
        env:
          TEAM: ${{ github.event.client_payload.fields.team_name }}
          APP: ${{ github.event.client_payload.fields.app_name }}
          APP_TYPE: ${{ github.event.client_payload.fields.app_type }}
          SAML_ENTITY_ID: ${{ github.event.client_payload.fields.saml_entity_id }}
          SAML_ACS_URL: ${{ github.event.client_payload.fields.saml_acs_url }}
          OIDC_GRANT_TYPES: ${{ github.event.client_payload.fields.oidc_grant_types }}
          DEV: ${{ github.event.client_payload.fields.dev_redirect_uris }}
          TEST: ${{ github.event.client_payload.fields.test_redirect_uris }}
          STAGE: ${{ github.event.client_payload.fields.stage_redirect_uris }}
          PROD: ${{ github.event.client_payload.fields.prod_redirect_uris }}
          JIRA_URL: ${{ github.event.client_payload.jsm_url }}
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
          REPORTER: ${{ github.event.client_payload.reporter }}
          SUMMARY: ${{ github.event.client_payload.summary }}
        with:
          script: |
            function normalizeListLike(value) {
              const cleanToken = (token) => String(token || '')
                .trim()
                .replace(/^\[+/, '')
                .replace(/\]+$/, '')
                .replace(/^"+|"+$/g, '')
                .replace(/^[-*]\s+/, '')
                .trim();

              if (value === undefined || value === null) {
                return [];
              }

              if (Array.isArray(value)) {
                return value.map(cleanToken).filter(Boolean);
              }

              const raw = String(value).trim();
              if (!raw || raw.toLowerCase() === 'none provided') {
                return [];
              }

              if (raw.startsWith('[') && raw.endsWith(']')) {
                try {
                  const parsed = JSON.parse(raw);
                  if (Array.isArray(parsed)) {
                    return parsed.map(cleanToken).filter(Boolean);
                  }
                } catch {
                  // Fall through to delimiter split for non-JSON list strings.
                }
              }

              return raw
                .split(/\r?\n|,/) 
                .map(cleanToken)
                .filter(Boolean);
            }

            function asMarkdownList(value, fallback = 'None provided') {
              const items = normalizeListLike(value);
              return items.length ? items.map(v => `- ${v}`).join('\n') : fallback;
            }

            function asSingleValue(value, fallback = 'None provided') {
              const items = normalizeListLike(value);
              return items.length ? items[0] : fallback;
            }

            const team    = asSingleValue(process.env.TEAM);
            const app     = asSingleValue(process.env.APP);
            const appType = asSingleValue(process.env.APP_TYPE);
            const samlEntityId = asSingleValue(process.env.SAML_ENTITY_ID);
            const samlAcsUrl = asSingleValue(process.env.SAML_ACS_URL);
            const oidcGrantTypes = asMarkdownList(process.env.OIDC_GRANT_TYPES);
            const dev     = asMarkdownList(process.env.DEV);
            const test    = asMarkdownList(process.env.TEST);
            const stage   = asMarkdownList(process.env.STAGE);
            const prod    = asMarkdownList(process.env.PROD);
            const jiraUrl = process.env.JIRA_URL;
            const issueKey = process.env.ISSUE_KEY || 'UNKNOWN';
            const reporter = process.env.REPORTER || 'Unknown reporter';
            const summary  = process.env.SUMMARY || 'No summary provided';

            const body = [
              '### Jira Issue Key',
              issueKey,
              '### JIRA Ticket URL',
              jiraUrl,
              '### Jira Summary',
              summary,
              '### Reporter',
              reporter,
              '### Team Name',
              team,
              '### Application Name',
              app,
              '### Application Type',
              appType,
              '### OIDC Grant Types',
              oidcGrantTypes,
              '### SAML Entity ID',
              samlEntityId,
              '### SAML ACS URL',
              samlAcsUrl,
              '### Development Redirect URIs',
              dev,
              '### Test Redirect URIs',
              test,
              '### Staging Redirect URIs',
              stage,
              '### Production Redirect URIs',
              prod,
              '### Security Confirmation',
              '- [x] I confirm these URIs follow our security standards (e.g., HTTPS for non-localhost).',
            ].join('\n');

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: '[Manage Redirect URI][' + issueKey + ']: ' + app + ' (' + team + ')',
              labels: ['redirect-uris', 'automated-request'],
              body,
            });

            core.setOutput('issue_number', String(created.data.number));

      - name: Trigger Issue-to-PR Automation
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.create_issue.outputs.issue_number }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);

            if (!issueNumber) {
              core.setFailed('Issue number output is missing; cannot dispatch issue-to-pr request.');
              return;
            }

            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'issue-to-pr-request',
              client_payload: {
                issue_number: issueNumber,
              },
            });
