name: PingSSO Onboarding Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # AWS Credentials for S3 backend (Secrets)
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  
  # AWS Configuration (Environment Variables)
  AWS_REGION: ${{ vars.AWS_REGION }}
  
  # PingFederate Credentials (Secrets)
  TF_VAR_pf_admin_username: ${{ secrets.PF_ADMIN_USERNAME }}
  TF_VAR_pf_admin_password: ${{ secrets.PF_ADMIN_PASSWORD }}
  
  # PingFederate Configuration (Environment Variables)
  TF_VAR_pf_admin_base_url: ${{ vars.PF_ADMIN_BASE_URL }}
  TF_VAR_pf_admin_context: ${{ vars.PF_ADMIN_CONTEXT }}
  TF_VAR_pf_provider_trust_all_tls: ${{ vars.PF_PROVIDER_TRUST_ALL_TLS }}
  TF_VAR_pf_provider_bypass_external_validation_header: ${{ vars.PF_PROVIDER_BYPASS_EXTERNAL_VALIDATION_HEADER }}
  TF_VAR_pf_provider_product_version: ${{ vars.PF_PROVIDER_PRODUCT_VERSION }}

  # Optional Jira callback configuration
  JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
  JIRA_DONE_TRANSITION_NAME: ${{ vars.JIRA_DONE_TRANSITION_NAME }}

jobs:
  # JOB 1: VALIDATION & SECURITY SCAN
  validate-and-plan:
    name: "Validate & Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0

      - name: Setup OPA (Open Policy Agent)
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Terraform Init
        run: terraform init
        working-directory: ./platform # Assuming your main execution root is here

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./platform

      - name: Terraform Plan
        # Generates a binary plan file so we can convert it to JSON for OPA
        id: plan
        run: |
          terraform plan -out=tfplan.binary -no-color | tee plan_output.txt
        working-directory: ./platform
        continue-on-error: true

      - name: Convert Plan to JSON
        # OPA cannot read the binary plan, it needs JSON
        run: terraform show -json tfplan.binary > tfplan.json
        working-directory: ./platform

      - name: Run OPA Security Check
        id: opa_check
        working-directory: ./platform
        run: |
          # Run OPA against the JSON plan using the policies directory at repo root
          # Note: We point to ../policies because we are in the ./platform directory
          opa eval --format pretty -i tfplan.json -d ../policies/ "data.terraform.pingsso.deny" > violations.txt
          
          # Check if the output file has content (meaning violations were found)
          if [ -s violations.txt ]; then
            echo "❌ SECURITY CHECK FAILED: The following policies were violated:"
            echo "-------------------------------------------------------------"
            cat violations.txt
            echo "-------------------------------------------------------------"
            echo "Build failed. Please fix these errors in your .tf file."
            exit 1
          else
            echo "✅ Security Check Passed. No policy violations found."
          fi

      - name: Comment Plan on PR
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('./platform/plan_output.txt', 'utf8');
            
            const output = `#### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
            
            <details><summary>Show Plan</summary>
            
            \`\`\`terraform
            ${planOutput}
            \`\`\`
            
            </details>
            
            **OPA Security Check**: ✅ Passed
            
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # JOB 2: DEPLOY (Only runs on Main branch if Validation passes)
  apply-changes:
    name: "Apply to PingFederate"
    needs: validate-and-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production # Adds an optional manual approval button in GitHub
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: ./platform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./platform

      - name: Read Jira metadata from merged PR
        id: jira_meta
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');

            const { owner, repo } = context.repo;
            const commitSha = context.sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: commitSha
            });

            if (!prs.data.length) {
              core.info('No PR found for current commit. Jira callback will be skipped.');
              core.setOutput('jira_key', '');
              core.setOutput('jira_url', '');
              return;
            }

            const pr = prs.data[0];
            const body = pr.body || '';

            const keyMatch = body.match(/Jira Issue Key:\s*([^\n]+)/i);
            const urlMatch = body.match(/Jira Ticket URL:\s*([^\n]+)/i);

            core.setOutput('pr_url', pr.html_url);
            core.setOutput('jira_key', keyMatch ? keyMatch[1].trim() : '');
            core.setOutput('jira_url', urlMatch ? urlMatch[1].trim() : '');

      - name: Post Jira deployment comment
        if: steps.jira_meta.outputs.jira_key != '' && env.JIRA_BASE_URL != ''
        env:
          JIRA_KEY: ${{ steps.jira_meta.outputs.jira_key }}
          JIRA_TICKET_URL: ${{ steps.jira_meta.outputs.jira_url }}
          PR_URL: ${{ steps.jira_meta.outputs.pr_url }}
          GITHUB_SHA: ${{ github.sha }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${JIRA_USER_EMAIL:-}" ] || [ -z "${JIRA_API_TOKEN:-}" ]; then
            echo "Jira credentials not configured. Skipping Jira comment."
            exit 0
          fi

          COMMENT_TEXT=$(cat <<EOF
          PingFederate configuration was deployed successfully from GitHub Actions.

          Repository: ${{ github.repository }}
          Commit: $GITHUB_SHA
          Pull Request: $PR_URL
          Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Jira Ticket URL: $JIRA_TICKET_URL
          EOF
          )

          JIRA_API_ROOT="${JIRA_BASE_URL%/}"
          JIRA_KEY_CLEAN="$(printf "%s" "$JIRA_KEY" | tr -d '\r' | awk '{print $1}')"

          jq -n --arg body "$COMMENT_TEXT" '{body:$body}' > jira-comment.json

          HTTP_CODE=$(curl -sS -o jira-comment-response.json -w "%{http_code}" -X POST \
            --user "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data @jira-comment.json \
            "$JIRA_API_ROOT/rest/api/3/issue/$JIRA_KEY_CLEAN/comment" || true)

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Jira comment failed with HTTP $HTTP_CODE"
            cat jira-comment-response.json
            exit 1
          fi

      - name: Transition Jira ticket to done state
        if: steps.jira_meta.outputs.jira_key != '' && env.JIRA_BASE_URL != '' && env.JIRA_DONE_TRANSITION_NAME != ''
        env:
          JIRA_KEY: ${{ steps.jira_meta.outputs.jira_key }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${JIRA_USER_EMAIL:-}" ] || [ -z "${JIRA_API_TOKEN:-}" ]; then
            echo "Jira credentials not configured. Skipping Jira transition."
            exit 0
          fi

          JIRA_API_ROOT="${JIRA_BASE_URL%/}"
          JIRA_KEY_CLEAN="$(printf "%s" "$JIRA_KEY" | tr -d '\r' | awk '{print $1}')"

          HTTP_CODE=$(curl -sS -o jira-transitions-response.json -w "%{http_code}" \
            --user "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_API_ROOT/rest/api/3/issue/$JIRA_KEY_CLEAN/transitions" || true)

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Jira transition lookup failed with HTTP $HTTP_CODE"
            cat jira-transitions-response.json
            exit 1
          fi

          cp jira-transitions-response.json transitions.json

          TRANSITION_ID=$(jq -r --arg name "$JIRA_DONE_TRANSITION_NAME" '.transitions[] | select(.name == $name) | .id' transitions.json | head -n 1)

          if [ -z "$TRANSITION_ID" ]; then
            echo "No Jira transition named '$JIRA_DONE_TRANSITION_NAME' found. Skipping transition."
            exit 0
          fi

          jq -n --arg id "$TRANSITION_ID" '{transition:{id:$id}}' > transition-request.json

          HTTP_CODE=$(curl -sS -o jira-transition-post-response.json -w "%{http_code}" -X POST \
            --user "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data @transition-request.json \
            "$JIRA_API_ROOT/rest/api/3/issue/$JIRA_KEY_CLEAN/transitions" || true)

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Jira transition failed with HTTP $HTTP_CODE"
            cat jira-transition-post-response.json
            exit 1
          fi