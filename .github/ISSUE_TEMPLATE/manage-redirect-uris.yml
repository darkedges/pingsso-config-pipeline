name: Redirect URI Request
description: Request new or updated redirect URIs for an application.
title: "[Manage Redirect URI]: "
labels: ["redirect-uris", "configuration"]
body:
  - type: input
    id: jira_url
    attributes:
      label: JIRA Ticket URL
      placeholder: e.g., https://darkedges.atlassian.net/jira/service-1
    validations:
      required: true

  - type: input
    id: team_name
    attributes:
      label: Team Name
      placeholder: e.g., Cloud-Platform-Team
    validations:
      required: true

  - type: input
    id: app_name
    attributes:
      label: Application Name
      placeholder: e.g., customer-portal-api
    validations:
      required: true

  - type: dropdown
    id: app_type
    attributes:
      label: Application Type
      options:
       - SAML
       - OIDC / OAuth2
    validations:
      required: true

  - type: textarea
    id: dev_redirect_uris
    attributes:
      label: Development Redirect URIs
      description: List one URI per line for the DEV environment.
      placeholder: |
        http://localhost:3000/callback
    validations:
      required: false

  - type: textarea
    id: test_redirect_uris
    attributes:
      label: Test Redirect URIs
      description: List one URI per line for the TEST environment.
    validations:
      required: false

  - type: textarea
    id: stage_redirect_uris
    attributes:
      label: Staging Redirect URIs
      description: List one URI per line for the STAGE environment.
    validations:
      required: false

  - type: textarea
    id: prod_redirect_uris
    attributes:
      label: Production Redirect URIs
      description: List one URI per line for the PROD environment.
    validations:
      required: false

  - type: input
    id: saml_entity_id
    attributes:
      label: SAML Entity ID
      description: Required when Application Type is SAML.
      placeholder: e.g., https://sp.vendor.com/saml2
    validations:
      required: false

  - type: input
    id: saml_acs_url
    attributes:
      label: SAML ACS URL
      description: Required when Application Type is SAML. Must be HTTPS.
      placeholder: e.g., https://sp.vendor.com/sso/consume
    validations:
      required: false

  - type: textarea
    id: oidc_grant_types
    attributes:
      label: OIDC Grant Types
      description: Required when Application Type is OIDC. One value per line.
      placeholder: |
        AUTHORIZATION_CODE
        REFRESH_TOKEN
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Security Confirmation
      options:
        - label: I confirm these URIs follow our security standards (e.g., HTTPS for non-localhost).
          required: true
